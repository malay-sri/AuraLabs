<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura AI Profile</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>

<body class="bg-slate-100">
    <div class="max-w-3xl mx-auto p-8">
        <div class="bg-white rounded-3xl shadow-xl p-8">
            <div class="flex items-center gap-6">
                <img src="Assets/Images/profile_pic.jpg" alt="User Profile Picture" class="w-24 h-24 rounded-full" />

                <div>
                    <h1 id="profileName" class="text-3xl font-bold">Loading...</h1>

                    <p id="occupation" class="text-gray-500"></p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-5 mt-8">
                <div class="bg-purple-50 rounded-xl p-5">
                    <p class="text-gray-500">Age</p>
                    <h2 id="age" class="text-2xl font-bold"></h2>
                </div>

                <div class="bg-green-50 rounded-xl p-5">
                    <p class="text-gray-500">Monthly Income</p>
                    <h2 id="income" class="text-2xl font-bold"></h2>
                </div>

                <div class="bg-blue-50 rounded-xl p-5">
                    <p class="text-gray-500">Available Balance</p>
                    <h2 id="balance" class="text-2xl font-bold"></h2>
                </div>

                <div class="bg-orange-50 rounded-xl p-5">
                    <p class="text-gray-500">LifeScore</p>
                    <h2 id="lifeScore" class="text-2xl font-bold text-purple-700">0</h2>
                </div>
            </div>
        </div>
    </div>

    <script>
        fetch("Assets/data/customer.json")
            .then((r) => r.json())
            .then((data) => {
                const c = data.customer;

                document.getElementById("profileName").textContent = c.name;
                document.getElementById("occupation").textContent = c.occupation;

                document.getElementById("age").textContent = c.age;

                document.getElementById("income").textContent =
                    "₹" + c.monthly_income.toLocaleString("en-IN");

                document.getElementById("balance").textContent =
                    "₹" + c.available_balance.toLocaleString("en-IN");

                document.getElementById("lifeScore").textContent = c.life_score;
            });
    </script>
</body>

</html>
